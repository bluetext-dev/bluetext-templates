apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: flutter
spec:
  ingressClassName: traefik
  rules:
    - host: flutter.{{NAMESPACE}}.bluetext.localhost
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: flutter
                port:
                  number: 80
