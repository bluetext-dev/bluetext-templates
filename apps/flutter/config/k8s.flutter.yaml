apiVersion: apps/v1
kind: Deployment
metadata:
  name: flutter
spec:
  replicas: 1
  selector:
    matchLabels:
      app: flutter
  template:
    metadata:
      labels:
        app: flutter
    spec:
      containers:
        - name: app
          image: ghcr.io/cirruslabs/flutter:stable
          command: ["sh", "-c", "cd /app && ./bin/init && exec ./bin/dev"]
          ports:
            - containerPort: 8080
          env:
            - name: ANDROID_ADB_SERVER_ADDRESS
              value: host.docker.internal
          volumeMounts:
            - name: project
              mountPath: /app
            - name: pub-cache
              mountPath: /root/.pub-cache
            - name: gradle-cache
              mountPath: /root/.gradle
            - name: sdk-cache
              mountPath: /sdk-cache
      volumes:
        - name: project
          hostPath:
            path: /var/mnt/project/code/apps/flutter
            type: Directory
        - name: pub-cache
          hostPath:
            path: /var/mnt/project/.flutter-cache/pub
            type: DirectoryOrCreate
        - name: gradle-cache
          hostPath:
            path: /var/mnt/project/.flutter-cache/gradle
            type: DirectoryOrCreate
        - name: sdk-cache
          hostPath:
            path: /var/mnt/project/.flutter-cache/sdk
            type: DirectoryOrCreate
---
apiVersion: v1
kind: Service
metadata:
  name: flutter
spec:
  type: ClusterIP
  selector:
    app: flutter
  ports:
    - port: 80
      targetPort: 8080
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: flutter
spec:
  ingressClassName: traefik
  rules:
    - host: flutter.{{NAMESPACE}}.bluetext.localhost
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: flutter
                port:
                  number: 80
