name: API Role-Based Access Control
description: Add role-guarded routes to the API with RBAC enforcement via Kong and Curity roles scope
tags: [auth, rbac, api, kong, curity]
prerequisites:
  - description: API service exists
    check: service_exists
    params:
      id: api
  - description: Kong service exists
    check: service_exists
    params:
      id: kong
  - description: Curity service exists
    check: service_exists
    params:
      id: curity
  - description: Curity OAuth config exists (run auth/curity-oauth first)
    check: file_exists
    params:
      file: config/curity/oauth-config.xml
caveats:
  - API trusts the JWT from Kong without signature verification (Kong already validated it)
  - Adds the jwt-auth client crate and rewrites API source (main.rs, Cargo.toml)
  - Kong pre-function plugins decode JWT base64 payload to check roles
variables:
  - name: deploy_target
    alias: d
    description: '<run-spec>/<deploy-name> — context for service start/stop/restart steps (e.g. app/development-local)'
    type: deploy-target
    required: true
  - name: namespace
    description: Namespace where services are running
    type: string
    default: main
  - name: datastore
    alias: d
    description: Data store backend (hsqldb or couchbase)
    type: string
    default: hsqldb
restarts: [curity, kong, api]
see_also: [auth/kong-phantom-token, auth/curity-oauth, auth/service-jwt]
steps:
  - name: Add jwt-auth client library
    tool: shell_exec
    params:
      command: "b client add jwt-auth"
  - name: Write roles scope and roles on flutter-app client for Curity
    tool: file_write
    params:
      file: config/curity/roles-scope.xml
      content_file: files/roles-scope.xml
  - name: Write roles claim provider for {{datastore}}
    tool: file_write
    params:
      file: config/curity/roles-claims.xml
      content_file: files/roles-claims-{{datastore}}.xml
  - name: Write claims mapper for access token and ID token
    tool: file_write
    params:
      file: config/curity/claims-mapper.xml
      content_file: files/claims-mapper.xml
  - name: Write User Management profile for SCIM account management
    tool: file_write
    params:
      file: config/curity/user-management.xml
      content_file: files/user-management.xml
  - name: Write Kong declarative config with RBAC route enforcement
    tool: file_write
    params:
      file: config/kong/kong.yaml
      content_file: files/kong-rbac.yaml
  - name: Write API with JWT extraction and role-guarded routes
    tool: file_write
    params:
      file: code/services/api/src/main.rs
      content_file: files/api-main.rs
  - name: Write API Cargo.toml with base64 dependency
    tool: file_write
    params:
      file: code/services/api/Cargo.toml
      content_file: files/api-cargo.toml
  - name: Remove direct ingress for api
    tool: file_delete
    params:
      file: config/k8s/api/api/base/ingress.yaml
  - name: Add gateway annotations to api
    tool: file_patch
    params:
      file: config/k8s/api/api/base/deployment.yaml
      operation: merge
      path: spec.template.metadata.annotations
      content: |
        bluetext.io/gateway: kong
        bluetext.io/phantom-token: "true"
  - name: Restart curity in {{namespace}}
    tool: service_restart
    params:
      id: curity
      deploy_target: "{{deploy_target}}"
  - name: Reload kong in {{namespace}}
    tool: service_reload
    params:
      id: kong
      deploy_target: "{{deploy_target}}"
  - name: Restart api in {{namespace}}
    tool: service_restart
    params:
      id: api
      deploy_target: "{{deploy_target}}"
