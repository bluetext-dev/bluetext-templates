_format_version: "3.0"
plugins:
  - name: phantom-token
    config:
      introspection_endpoint: http://curity.{{namespace}}.svc.cluster.local/oauth/v2/oauth-introspect
      client_id: phantom-token-client
      client_secret: phantom-token-secret
      token_cache_seconds: 300
services:
  - name: api
    url: http://api.{{namespace}}.svc.cluster.local
    routes:
      - name: api-route
        paths:
          - /api
        strip_path: true
        plugins:
          - name: pre-function
            config:
              access:
                - |
                  local path = kong.request.get_path()
                  if not path:match("^/admin") and not path:match("^/moderate") then
                    return
                  end
                  local cjson = require "cjson"
                  local auth = kong.request.get_header("Authorization")
                  if not auth then return kong.response.exit(401, {message="missing token"}) end
                  local token = auth:match("Bearer%s+(.+)")
                  if not token then return kong.response.exit(401, {message="invalid auth header"}) end
                  local parts = {}
                  for part in token:gmatch("[^%.]+") do parts[#parts+1] = part end
                  if #parts ~= 3 then return kong.response.exit(401, {message="invalid token"}) end
                  local payload = ngx.decode_base64(parts[2]:gsub("-","+"):gsub("_","/"))
                  if not payload then return kong.response.exit(401, {message="invalid token payload"}) end
                  local ok, claims = pcall(cjson.decode, payload)
                  if not ok then return kong.response.exit(401, {message="invalid token claims"}) end
                  local roles = claims.roles or {}
                  if path:match("^/admin") then
                    for _, r in ipairs(roles) do if r == "admin" then return end end
                    return kong.response.exit(403, {message="admin role required"})
                  end
                  if path:match("^/moderate") then
                    for _, r in ipairs(roles) do if r == "admin" or r == "moderator" then return end end
                    return kong.response.exit(403, {message="moderator or admin role required"})
                  end
