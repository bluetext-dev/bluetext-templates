name: App OIDC Authentication
description: Add OpenID Connect authentication to an existing Flutter app
tags: [auth, oidc, mobile, curity, flutter]
prerequisites:
  - description: Flutter service exists
    check: service_exists
    params:
      id: "{{app_id}}"
caveats:
  - Patches pubspec.yaml — existing comments will be stripped (serde_yaml limitation)
  - Replaces main.dart with a login screen — back up your main.dart if you have custom code
  - "iOS: add CFBundleURLTypes to Info.plist for com.bluetext.app scheme"
  - Uses Chrome Custom Tab for auth — process death on emulators is handled by persisted PKCE state
variables:
  - name: app_id
    description: ID of the existing app to add OIDC to
    type: service
    required: true
  - name: namespace
    description: Namespace where Curity is running (for endpoint URLs)
    type: string
    default: main
see_also: [auth/curity-oauth]
steps:
  - name: Add OIDC dependencies to pubspec.yaml
    tool: file_patch
    params:
      file: "code/services/{{app_id}}/pubspec.yaml"
      operation: merge
      path: dependencies
      content: |
        flutter_secure_storage: ^9.2.4
        http: ^1.2.2
        url_launcher: ^6.3.1
        app_links: ^6.3.3
        crypto: ^3.0.6
  - name: Write auth config with Curity endpoints
    tool: file_write
    params:
      file: "code/services/{{app_id}}/lib/config/auth_config.dart"
      content_file: files/auth-config.dart
  - name: Write OIDC auth service
    tool: file_write
    params:
      file: "code/services/{{app_id}}/lib/services/auth_service.dart"
      content_file: files/auth-service.dart
  - name: Write authenticated API client
    tool: file_write
    params:
      file: "code/services/{{app_id}}/lib/services/api_client.dart"
      content_file: files/api-client.dart
  - name: Write main.dart with login screen
    tool: file_write
    params:
      file: "code/services/{{app_id}}/lib/main.dart"
      content_file: files/main.dart
  - name: Add OIDC redirect URI receiver to Android manifest
    tool: file_write
    params:
      file: "code/services/{{app_id}}/android/app/src/main/AndroidManifest.xml"
      content_file: files/AndroidManifest.xml
