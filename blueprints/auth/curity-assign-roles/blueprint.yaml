name: Curity Assign Roles
description: Assign roles to existing user accounts via SCIM API
tags: [auth, curity, rbac]
prerequisites:
  - description: Curity service exists
    check: service_exists
    params:
      id: curity
  - description: User Management profile configured (run auth/api-rbac first)
    check: file_exists
    params:
      file: config/curity/user-management.xml
caveats:
  - Users must already exist (registered via app or created with auth/curity-create-users)
  - Requires Curity to be running with the User Management profile
variables:
  - name: users
    description: "Comma-separated username:role pairs (e.g. alice:admin,bob:moderator)"
    type: string
  - name: namespace
    description: Namespace where Curity is running
    type: string
    default: main
see_also: [auth/curity-create-users, auth/api-rbac]
steps:
  - name: Write role assignment script
    tool: file_write
    params:
      file: config/curity/assign-roles.sh
      content_file: files/assign-roles.sh
  - name: Assign roles to users
    tool: shell_exec
    params:
      command: "sh config/curity/assign-roles.sh {{namespace}} {{users}}"
