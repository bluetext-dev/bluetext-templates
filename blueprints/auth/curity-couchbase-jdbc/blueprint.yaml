name: Curity Couchbase Data Store (JDBC)
description: Configure Curity with Couchbase via a JDBC wrapper that translates SQL to N1QL — fits Curity licenses that allow JDBC data sources
tags: [auth, curity, couchbase, database, jdbc]
prerequisites:
  - description: Curity service exists
    check: service_exists
    params:
      id: curity
  - description: Couchbase service exists
    check: service_exists
    params:
      id: couchbase
  - description: Service Config Manager exists
    check: service_exists
    params:
      id: service-config-manager
caveats:
  - Overwrites Curity deployment (custom image bundling the Couchbase JDBC wrapper)
  - For licenses that include the Plugin SDK and unrestricted data-source types, prefer auth/curity-couchbase (native plugin)
  - Curity may restart once or twice while Couchbase initializes — this is normal
  - Couchbase admin credentials are Administrator/password — change for non-dev environments
  - Collections and Analytics datasets are provisioned by service-config-manager before Curity connects
variables:
  - name: namespace
    alias: n
    description: Namespace where Curity and Couchbase are running
    type: string
    default: main
restarts: [service-config-manager, curity]
see_also: [auth/curity-couchbase, auth/curity-oauth, auth/kong-phantom-token]
steps:
  - name: Add curity bucket to service-config-manager Couchbase config
    tool: file_patch
    params:
      file: config/service-config-manager/couchbase/couchbase.yaml
      operation: merge
      path: buckets
      content: |
        curity:
          defaults:
            flush_enabled: true
          analytics: true
          env_settings:
            dev:
              ram_quota_mb: 256
            prod:
              ram_quota_mb: 2048
              num_replicas: 3
          scopes:
            _default:
              collections:
                accounts: {}
                credentials: {}
                sessions: {}
                tokens: {}
                delegations: {}
                nonces: {}
                linked_accounts: {}
                devices: {}
                audit: {}
                dynamically_registered_clients: {}
                database_clients: {}
                buckets: {}
                database_service_providers: {}
                entities: {}
                entity_relations: {}
  - name: Overwrite Curity deployment (custom image with Couchbase JDBC driver)
    tool: file_write
    params:
      file: config/services/curity/base/deployment.yaml
      content_file: files/deployment.yaml
  - name: Write Dockerfile (Curity + pre-built Couchbase JDBC wrapper from GCS)
    tool: file_write
    params:
      file: code/services/curity/Dockerfile
      content_file: files/Dockerfile
  - name: Write datasource config (Couchbase via JDBC)
    tool: file_write
    params:
      file: config/curity/datasource.xml
      content_file: files/datasource.xml
  - name: Register datasource relationship
    tool: file_patch
    params:
      file: config/bluetext.yaml
      operation: append_list
      path: relationships
      content: |
        - from: curity
          to: couchbase
          type: datasource
          label: Uses as data store
          blueprint: auth/curity-couchbase-jdbc
  - name: Restart service-config-manager in {{namespace}}
    tool: service_restart
    params:
      id: service-config-manager
      namespace: "{{namespace}}"
  - name: Restart curity in {{namespace}}
    tool: service_restart
    params:
      id: curity
      namespace: "{{namespace}}"
