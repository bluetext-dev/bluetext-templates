name: Curity Couchbase Data Store
description: Configure Curity with Couchbase as a native data source — accounts, tokens, sessions, and credentials backed by Couchbase via the Curity DAP plugin
tags: [auth, curity, couchbase, database, plugin]
prerequisites:
  - description: Curity service exists
    check: service_exists
    params:
      id: curity
  - description: Couchbase service exists
    check: service_exists
    params:
      id: couchbase
caveats:
  - Overwrites Curity deployment (custom image bundling the Couchbase data-source plugin pulled from gs://bluetext-cli-releases/plugins/)
  - Requires a Curity license that allows custom data-source types (data-sources feature unrestricted, or with "couchbase" listed)
  - The plugin auto-provisions the curity bucket (256 MiB by default), the configured scope, ten curity-* collections, and primary indexes on first connect — no external provisioner needed. Set the data-source's auto-provision field to false for production where the bucket is pre-provisioned and the configured user lacks create privileges
  - For licenses restricted to jdbc data sources, use auth/curity-couchbase-jdbc instead
  - Couchbase admin credentials are Administrator/password — change for non-dev environments
variables:
  - name: namespace
    alias: n
    description: Namespace where Curity and Couchbase are running
    type: string
    default: main
restarts: [curity]
see_also: [auth/curity-couchbase-jdbc, auth/curity-oauth, auth/kong-phantom-token]
steps:
  - name: Overwrite Curity deployment (custom image with Couchbase plugin)
    tool: file_write
    params:
      file: config/services/curity/base/deployment.yaml
      content_file: files/deployment.yaml
  - name: Write Dockerfile (Curity + pre-built Couchbase plugin from GCS)
    tool: file_write
    params:
      file: code/services/curity/Dockerfile
      content_file: files/Dockerfile
  - name: Write datasource config (Couchbase via native plugin)
    tool: file_write
    params:
      file: config/curity/datasource.xml
      content_file: files/datasource.xml
  - name: Register datasource relationship
    tool: file_patch
    params:
      file: config/bluetext.yaml
      operation: append_list
      path: relationships
      content: |
        - from: curity
          to: couchbase
          type: datasource
          label: Uses as data store
          blueprint: auth/curity-couchbase
  - name: Restart curity in {{namespace}}
    tool: service_restart
    params:
      id: curity
      namespace: "{{namespace}}"
