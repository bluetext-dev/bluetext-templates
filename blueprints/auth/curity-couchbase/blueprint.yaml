name: Curity Couchbase Data Store
description: Switch Curity's data source from HSQLDB to Couchbase — accounts, tokens, sessions, credentials, all in one place
tags: [auth, curity, couchbase, database]
prerequisites:
  - description: Curity service exists
    check: service_exists
    params:
      id: curity
  - description: Couchbase service exists
    check: service_exists
    params:
      id: couchbase
  - description: Service Config Manager exists
    check: service_exists
    params:
      id: service-config-manager
caveats:
  - First build takes several minutes (downloads Gradle, JDK, and plugin dependencies for the Couchbase Data Access Provider)
  - Curity may restart once or twice while Couchbase initializes — this is normal
  - Overwrites Curity k8s manifest (switches to custom image with Couchbase plugin)
  - "The Couchbase plugin (github.com/curityio/couchbase-data-access-provider) auto-creates collections on first startup"
  - Couchbase admin credentials are Administrator/password — change for non-dev environments
variables:
  - name: namespace
    description: Namespace where Curity and Couchbase are running
    type: string
    default: main
restarts: [service-config-manager, curity]
see_also: [auth/curity-oauth, auth/kong-phantom-token]
steps:
  - name: Add curity bucket to service-config-manager Couchbase config
    tool: file_patch
    params:
      file: config/service-config-manager/couchbase/couchbase.yaml
      operation: merge
      path: buckets
      content: |
        curity:
          defaults:
            flush_enabled: true
          env_settings:
            dev:
              ram_quota_mb: 256
            prod:
              ram_quota_mb: 2048
              num_replicas: 3
          scopes:
            _default:
              collections: {}
  - name: Overwrite Curity k8s manifest with Couchbase-compatible version (custom image, no HSQLDB)
    tool: file_write
    params:
      file: config/services/k8s.curity.yaml
      content_file: files/k8s.curity.yaml
  - name: Write Dockerfile for Curity with Couchbase Data Access Provider plugin
    tool: file_write
    params:
      file: code/services/curity/Dockerfile
      content_file: files/Dockerfile
  - name: Overwrite base-config.xml with Couchbase data source
    tool: file_write
    params:
      file: config/curity/base-config.xml
      content_file: files/base-config.xml
  - name: Register datasource relationship
    tool: file_patch
    params:
      file: config/bluetext.yaml
      operation: append_list
      path: relationships
      content: |
        - from: curity
          to: couchbase
          type: datasource
          label: Uses as data store
          blueprint: auth/curity-couchbase
  - name: Restart service-config-manager in {{namespace}}
    tool: service_restart
    params:
      id: service-config-manager
      namespace: "{{namespace}}"
  - name: Restart curity in {{namespace}}
    tool: service_restart
    params:
      id: curity
      namespace: "{{namespace}}"
