apiVersion: apps/v1
kind: Deployment
metadata:
  name: curity
spec:
  replicas: 1
  selector:
    matchLabels:
      app: curity
  template:
    metadata:
      labels:
        app: curity
    spec:
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
      initContainers:
        - name: config-templater
          image: busybox:stable
          command:
            - sh
            - -c
            - |
              for f in /config-template/*.xml; do
                sed -e "s/__NAMESPACE__/$POD_NAMESPACE/g" \
                    -e "s/__COUCHBASE_HOST__/$COUCHBASE_HOST/g" \
                    -e "s/__COUCHBASE_TLS__/$COUCHBASE_TLS/g" \
                    -e "s/__COUCHBASE_USERNAME__/$COUCHBASE_USERNAME/g" \
                    -e "s/__COUCHBASE_PASSWORD__/$COUCHBASE_PASSWORD/g" \
                    "$f" > "/config/$(basename $f)"
              done
          env:
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: COUCHBASE_HOST
              value: "couchbase-headless.{{NAMESPACE}}.svc.cluster.local"
            - name: COUCHBASE_USERNAME
              value: "Administrator"
            - name: COUCHBASE_PASSWORD
              value: "password"
            - name: COUCHBASE_TLS
              value: "false"
          volumeMounts:
            - name: config-template
              mountPath: /config-template
            - name: init-config
              mountPath: /config
      containers:
        - name: curity
          image: bluetext-curity:latest
          imagePullPolicy: Never
          command: ["idsvr"]
          args: ["--admin", "-s", "default"]
          env:
            - name: PASSWORD
              value: admin
          ports:
            - containerPort: 8443
              name: runtime
            - containerPort: 6749
              name: admin
          readinessProbe:
            httpGet:
              path: /admin/alive
              port: 6749
              scheme: HTTPS
            initialDelaySeconds: 30
            periodSeconds: 5
            failureThreshold: 36
          volumeMounts:
            - name: init-config
              mountPath: /opt/idsvr/etc/init
            - name: license
              mountPath: /opt/idsvr/etc/init/license
              readOnly: true
      volumes:
        - name: config-template
          hostPath:
            path: /var/mnt/project/config/curity
            type: DirectoryOrCreate
        - name: init-config
          emptyDir: {}
        - name: license
          secret:
            secretName: curity-license
            optional: true
            items:
              - key: license-key
                path: default
        - name: project
          hostPath:
            path: /var/mnt/project/code/services/curity
            type: DirectoryOrCreate
