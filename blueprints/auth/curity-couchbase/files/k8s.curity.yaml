apiVersion: apps/v1
kind: Deployment
metadata:
  name: curity
spec:
  replicas: 1
  selector:
    matchLabels:
      app: curity
  template:
    metadata:
      labels:
        app: curity
    spec:
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
      containers:
        - name: curity
          image: bluetext-curity:latest
          imagePullPolicy: IfNotPresent
          args: ["--admin", "-s", "default"]
          env:
            - name: PASSWORD
              value: admin
          ports:
            - containerPort: 8443
              name: runtime
            - containerPort: 6749
              name: admin
          readinessProbe:
            httpGet:
              path: /admin/alive
              port: 6749
              scheme: HTTPS
            initialDelaySeconds: 30
            periodSeconds: 5
            failureThreshold: 36
          volumeMounts:
            - name: init-config
              mountPath: /opt/idsvr/etc/init
            - name: license
              mountPath: /opt/idsvr/etc/init/license
              readOnly: true
      volumes:
        - name: init-config
          hostPath:
            path: /var/mnt/project/config/curity
            type: DirectoryOrCreate
        - name: license
          secret:
            secretName: curity-license
            optional: true
            items:
              - key: license-key
                path: default
        - name: project
          hostPath:
            path: /var/mnt/project/code/services/curity
            type: DirectoryOrCreate
---
apiVersion: traefik.io/v1alpha1
kind: ServersTransport
metadata:
  name: curity-transport
spec:
  insecureSkipVerify: true
---
apiVersion: v1
kind: Service
metadata:
  name: curity
spec:
  type: ClusterIP
  selector:
    app: curity
  ports:
    - name: runtime
      port: 80
      targetPort: 8443
---
apiVersion: v1
kind: Service
metadata:
  name: curity-admin
spec:
  type: ClusterIP
  selector:
    app: curity
  ports:
    - name: admin
      port: 80
      targetPort: 6749
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: curity-headers
spec:
  headers:
    customRequestHeaders:
      X-Forwarded-Proto: "http"
      X-Forwarded-Port: "8888"
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: curity
spec:
  entryPoints: [web]
  routes:
    - match: Host(`curity.{{NAMESPACE}}.bluetext.localhost`) || Host(`curity.{{NAMESPACE}}.bluetext.lvh.me`)
      kind: Rule
      middlewares:
        - name: curity-headers
      services:
        - name: curity
          port: 80
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: curity-admin
spec:
  entryPoints: [web]
  routes:
    - match: Host(`curity-admin.{{NAMESPACE}}.bluetext.localhost`)
      kind: Rule
      services:
        - name: curity-admin
          port: 80
          scheme: https
          serversTransport: curity-transport
