name: Curity Create Users
description: Create user accounts with passwords via SCIM API
tags: [auth, curity]
prerequisites:
  - description: Curity service exists
    check: service_exists
    params:
      id: curity
  - description: User Management profile configured (run auth/api-rbac first)
    check: file_exists
    params:
      file: config/curity/user-management.xml
caveats:
  - Uses a shared password for all users — for development only
  - Requires Curity to be running with the User Management profile
variables:
  - name: deploy_target
    alias: d
    description: '<run-spec>/<deploy-name> — resolves the namespace Curity is running in'
    type: deploy-target
    required: true
  - name: users
    description: "Comma-separated username:password pairs (e.g. alice:Pass1,bob:Pass2)"
    type: string
  - name: namespace
    description: ns-key within the run-spec (default `main`); the runtime expands `{{namespace}}` to the full namespace via `deploy_target`
    type: string
    default: main
see_also: [auth/curity-assign-roles, auth/api-rbac]
steps:
  - name: Write user creation script
    tool: file_write
    params:
      file: config/curity/create-users.sh
      content_file: files/create-users.sh
  - name: Create user accounts
    tool: shell_exec
    params:
      command: "sh config/curity/create-users.sh {{namespace}} {{users}}"
