name: Curity HSQLDB Data Store
description: Configure Curity with file-based HSQLDB for accounts, tokens, sessions, and credentials — persisted in .bluetext/curity-db/
tags: [auth, curity, hsqldb, database]
prerequisites:
  - description: Curity service exists
    check: service_exists
    params:
      id: curity
caveats:
  - Accounts persisted in file-based HSQLDB (survives pod restarts, stored in .bluetext/curity-db/)
  - Default credentials — change for non-dev environments
variables:
  - name: namespace
    alias: n
    description: Namespace where Curity is running
    type: string
    default: main
restarts: [curity]
see_also: [auth/curity-oauth, auth/curity-couchbase]
steps:
  - name: Overwrite Curity manifest with HSQLDB version (init container + data volume)
    tool: file_write
    params:
      file: config/services/k8s.curity.yaml
      content_file: files/k8s.curity.yaml
  - name: Write datasource config (HSQLDB)
    tool: file_write
    params:
      file: config/curity/datasource.xml
      content_file: files/datasource.xml
  - name: Restart curity in {{namespace}}
    tool: service_restart
    params:
      id: curity
      namespace: "{{namespace}}"
