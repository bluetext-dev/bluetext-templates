apiVersion: apps/v1
kind: Deployment
metadata:
  name: curity
  annotations:
    # `idsvr -r` reloads etc/init XML and merges with the running config —
    # ConfD-backed dynamic reload, no process restart, no downtime.
    bluetext.io/reload-command: "idsvr -r"
    bluetext.io/reload-watch: "config/curity"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: curity
  template:
    metadata:
      labels:
        app: curity
    spec:
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
      initContainers:
        - name: config-templater
          image: busybox:stable
          command: ['sh', '-c', 'for f in /config-template/*.xml; do sed "s/__NAMESPACE__/$POD_NAMESPACE/g" "$f" > "/config/$(basename $f)"; done']
          env:
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          volumeMounts:
            - name: config-template
              mountPath: /config-template
            - name: init-config
              mountPath: /config
        - name: init-db
          image: curity.azurecr.io/curity/idsvr:latest
          command:
            - sh
            - -c
            - |
              if [ ! -f /hsqldb/curity.script ] || ! grep -q "CREATE TABLE" /hsqldb/curity.script; then
                echo "Initializing HSQLDB schema..."
                java -cp "/opt/idsvr/lib/hsqldb-cli/sqltool-2.7.2.jar:/opt/idsvr/lib/hsqldb-cli/hsqldb-2.7.2.jar" \
                  org.hsqldb.cmdline.SqlTool \
                  --autoCommit \
                  --inlineRc="url=jdbc:hsqldb:file:/hsqldb/curity,user=,password=" \
                  /opt/idsvr/etc/hsqldb-create_database.sql
                echo "Schema initialized."
              else
                echo "HSQLDB schema already exists, skipping."
              fi
          volumeMounts:
            - name: hsqldb-data
              mountPath: /hsqldb
      containers:
        - name: curity
          image: curity.azurecr.io/curity/idsvr:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8443
              name: runtime
            - containerPort: 6749
              name: admin
          env:
            - name: PASSWORD
              value: admin
          readinessProbe:
            httpGet:
              path: /admin/alive
              port: 6749
              scheme: HTTPS
            initialDelaySeconds: 15
            periodSeconds: 5
            failureThreshold: 12
          volumeMounts:
            - name: init-config
              mountPath: /opt/idsvr/etc/init
            - name: hsqldb-data
              mountPath: /opt/idsvr/var/hsqldb
            - name: license
              mountPath: /opt/idsvr/etc/init/license
              readOnly: true
      volumes:
        - name: config-template
          hostPath:
            path: /var/mnt/system/config/curity
            type: DirectoryOrCreate
        - name: init-config
          emptyDir: {}
        - name: hsqldb-data
          hostPath:
            path: /var/mnt/system/.bluetext/curity-db
            type: DirectoryOrCreate
        - name: license
          secret:
            secretName: curity-license
            optional: true
            items:
              - key: license-key
                path: default
