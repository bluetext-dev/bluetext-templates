name: Curity Phantom Token Pattern
description: Deploy Curity + Kong with phantom token introspection to protect target services
tags: [auth, phantom-token, gateway, security]
prerequisites:
  - A running cluster (b start)
  - At least one existing service to protect (already added via b service add)
caveats:
  - Requires a Curity license key — get a free trial at developer.curity.io (on a bluetext VM, it is pre-set as $CURITY_LICENSE_KEY)
  - Kong phantom-token plugin version must match Kong version
  - Adds introspection latency per request (mitigated by token caching)
  - Target services will have their direct Ingress removed (traffic routes through Kong)
  - Default introspection credentials should be changed for non-dev environments
variables:
  - name: namespace
    description: Target namespace for Curity and Kong
    type: string
    default: auth
  - name: license_key
    description: Curity license key (get a free dev license at developer.curity.io)
    type: string
    required: true
  - name: target_services
    description: Comma-separated list of service IDs to protect with phantom tokens
    type: string
    required: true
see_also: [auth/curity, auth/curity-rbac, gateway/kong]
steps:
  - name: Add curity service template
    tool: service_add
    params:
      name: curity
  - name: Gitignore service secret files
    tool: file_write
    params:
      file: config/services/.gitignore
      content: "secret.*.yaml\n"
  - name: Write Curity license secret
    tool: file_write
    params:
      file: config/services/secret.curity.yaml
      content: |
        apiVersion: v1
        kind: Secret
        metadata:
          name: curity-license
        type: Opaque
        stringData:
          license-key: "{{license_key}}"
  - name: Add kong service template
    tool: service_add
    params:
      name: kong
  - name: Create {{namespace}} namespace
    tool: namespace_create
    params:
      id: "{{namespace}}"
  - name: Write Kong declarative config with phantom-token plugin
    tool: file_write
    params:
      file: config/kong/kong.yaml
      content_file: files/kong-declarative.yaml
  - name: Start curity in {{namespace}}
    tool: service_start
    params:
      id: curity
      namespace: "{{namespace}}"
  - name: Start kong in {{namespace}}
    tool: service_start
    params:
      id: kong
      namespace: "{{namespace}}"
  - name: Configure target services for phantom token
    for_each: target_services
    steps:
      - name: "Remove direct ingress for {{item}}"
        tool: file_patch
        params:
          file: "config/services/k8s.{{item}}.yaml"
          operation: remove_document
          match_kind: Ingress
      - name: "Add gateway annotations to {{item}}"
        tool: file_patch
        params:
          file: "config/services/k8s.{{item}}.yaml"
          operation: merge
          match_kind: Deployment
          path: spec.template.metadata.annotations
          content: |
            bluetext.io/gateway: kong
            bluetext.io/phantom-token: "true"
      - name: "Add Kong route for {{item}}"
        tool: file_patch
        params:
          file: config/kong/kong.yaml
          operation: append_list
          path: services
          content: |
            - name: "{{item}}"
              url: "http://{{item}}.{{namespace}}.svc.cluster.local"
              routes:
                - name: "{{item}}-route"
                  paths:
                    - "/{{item}}"
                  strip_path: true
      - name: "Restart {{item}} in {{namespace}}"
        tool: service_restart
        params:
          id: "{{item}}"
          namespace: "{{namespace}}"
