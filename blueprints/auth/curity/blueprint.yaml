name: Curity Identity Server
description: Deploy a standalone Curity Identity Server for OAuth 2.0 and OpenID Connect
tags: [auth, oidc, oauth]
prerequisites:
  - A running cluster (b start)
caveats:
  - Requires a Curity license key — get a free trial at developer.curity.io (on a bluetext VM, it is pre-set as $CURITY_LICENSE_KEY)
  - Uses default admin password "admin" — change for non-dev environments
  - Admin UI available at curity-admin.<namespace>.bluetext.localhost
variables:
  - name: namespace
    description: Target namespace
    type: string
    default: auth
  - name: license_key
    description: Curity license key (get a free dev license at developer.curity.io)
    type: string
    required: true
see_also: [auth/curity-rbac, auth/curity-phantom-token]
steps:
  - name: Add curity service template
    tool: service_add
    params:
      name: curity
  - name: Gitignore service secret files
    tool: file_write
    params:
      file: config/services/.gitignore
      content: "secret.*.yaml\n"
  - name: Write Curity license secret
    tool: file_write
    params:
      file: config/services/secret.curity.yaml
      content: |
        apiVersion: v1
        kind: Secret
        metadata:
          name: curity-license
        type: Opaque
        stringData:
          license-key: '{"License":"{{license_key}}"}'
  - name: Create {{namespace}} namespace
    tool: namespace_create
    params:
      id: "{{namespace}}"
  - name: Start curity in {{namespace}}
    tool: service_start
    params:
      id: curity
      namespace: "{{namespace}}"
