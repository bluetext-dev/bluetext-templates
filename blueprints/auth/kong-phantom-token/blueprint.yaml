name: Kong Phantom Token
description: Configure Kong with phantom token introspection and wire target services through the gateway
tags: [auth, phantom-token, gateway, kong, curity]
prerequisites:
  - description: Curity service exists
    check: service_exists
    params:
      id: curity
  - description: Kong service exists
    check: service_exists
    params:
      id: kong
  - description: Curity OAuth config exists (run auth/curity-oauth first)
    check: file_exists
    params:
      file: config/curity/oauth-config.xml
caveats:
  - Adds introspection latency per request (mitigated by 300s token caching)
  - Target services will have their direct Ingress removed (traffic routes through Kong)
  - Default introspection credentials (phantom-token-client / phantom-token-secret) — change for non-dev environments
variables:
  - name: namespace
    description: Namespace where Curity and Kong are running
    type: string
    default: main
  - name: targets
    description: Comma-separated list of service IDs to protect with phantom tokens
    type: string
    required: true
restarts: [curity, kong]
see_also: [auth/curity-oauth, auth/api-rbac]
steps:
  - name: Write phantom-token client definition for Curity
    tool: file_write
    params:
      file: config/curity/phantom-token-client.xml
      content_file: files/phantom-token-client.xml
  - name: Write Kong declarative config with phantom-token plugin
    tool: file_write
    params:
      file: config/kong/kong.yaml
      content_file: files/kong-declarative.yaml
  - name: Restart curity in {{namespace}}
    tool: service_restart
    params:
      id: curity
      namespace: "{{namespace}}"
  - name: Restart kong in {{namespace}}
    tool: service_restart
    params:
      id: kong
      namespace: "{{namespace}}"
  - name: Configure target services for phantom token
    for_each: targets
    steps:
      - name: "Remove direct ingress for {{item}}"
        tool: file_patch
        params:
          file: "config/services/k8s.{{item}}.yaml"
          operation: remove_document
          match_kind: Ingress
      - name: "Add gateway annotations to {{item}}"
        tool: file_patch
        params:
          file: "config/services/k8s.{{item}}.yaml"
          operation: merge
          match_kind: Deployment
          path: spec.template.metadata.annotations
          content: |
            bluetext.io/gateway: kong
            bluetext.io/phantom-token: "true"
      - name: "Add Kong route for {{item}}"
        tool: file_patch
        params:
          file: config/kong/kong.yaml
          operation: append_list
          path: services
          content: |
            - name: "{{item}}"
              url: "http://{{item}}.{{namespace}}.svc.cluster.local"
              routes:
                - name: "{{item}}-route"
                  paths:
                    - "/{{item}}"
                  strip_path: true
      - name: "Register gateway relationship for {{item}}"
        tool: file_patch
        params:
          file: config/bluetext.yaml
          operation: append_list
          path: relationships
          content: |
            - from: kong
              to: "{{item}}"
              type: gateway
              label: Routes traffic to
              blueprint: auth/kong-phantom-token
      - name: "Restart {{item}} in {{namespace}}"
        tool: service_restart
        params:
          id: "{{item}}"
          namespace: "{{namespace}}"
