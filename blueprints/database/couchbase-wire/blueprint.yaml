name: Wire Service to Couchbase
description: Inject Couchbase connection env vars (HOST, USERNAME, PASSWORD, BUCKET, etc.) into a target service's deployment so it can read them at runtime via the couchbase client library
tags: [database, couchbase]
prerequisites:
  - description: Target service exists
    check: service_exists
    params:
      id: "{{target}}"
  - description: Upstream exists (internal couchbase service or external couchbase-capella)
    check: upstream_exists
    params:
      id: "{{upstream}}"
  - description: Couchbase client crate is scaffolded (run `b client add couchbase` first)
    check: file_exists
    params:
      file: code/clients/src/couchbase.rs
variables:
  - name: target
    alias: t
    description: Service that needs Couchbase connectivity (e.g. api)
    type: service
  - name: upstream
    alias: u
    description: Couchbase source — internal service id or external service id
    type: string
    default: couchbase
  - name: profile
    alias: p
    description: Connection profile — "data" for SDK operations or "admin" for management API
    type: string
    default: data
  - name: namespace
    alias: n
    description: Target namespace
    type: string
    default: main
restarts:
  - "{{target}}"
steps:
  - name: Wire {{target}} to {{upstream}} ({{profile}})
    tool: service_wire
    params:
      target: "{{target}}"
      upstream: "{{upstream}}"
      profile: "{{profile}}"
  - name: Restart {{target}} to pick up new env vars
    tool: service_restart
    params:
      id: "{{target}}"
      namespace: "{{namespace}}"
