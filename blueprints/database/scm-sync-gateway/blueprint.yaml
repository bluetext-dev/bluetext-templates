name: Service Config Manager — Sync Gateway
description: Wire service-config-manager to configure Couchbase Sync Gateway databases
tags: [database, couchbase, service-config-manager]
prerequisites:
  - description: Service Config Manager exists
    check: service_exists
    params:
      id: service-config-manager
  - description: Couchbase Sync Gateway exists
    check: service_exists
    params:
      id: couchbase-sync-gateway
caveats:
  - Requires couchbase to be running before sync gateway can be configured
variables:
  - name: namespace
    description: Target namespace
    type: string
    default: main
restarts: [service-config-manager]
see_also: [database/scm-couchbase]
steps:
  - name: Add sync gateway to managed services
    tool: file_patch
    params:
      file: config/service-config-manager/managed-services.yaml
      operation: append_list
      path: .
      content: |
        - name: couchbase-sync-gateway
          type: couchbase-sync-gateway
          config_dir: service-config-manager/couchbase-sync-gateway
  - name: Write sync gateway config
    tool: file_write
    params:
      file: config/service-config-manager/couchbase-sync-gateway/couchbase-sync-gateway.yaml
      content_file: files/couchbase-sync-gateway.yaml
  - name: Register relationship
    tool: file_patch
    params:
      file: config/bluetext.yaml
      operation: append_list
      path: relationships
      content: |
        - from: service-config-manager
          to: couchbase-sync-gateway
          type: configures
          label: Manages databases for
          blueprint: database/scm-sync-gateway
  - name: Restart service-config-manager
    tool: service_restart
    params:
      id: service-config-manager
      namespace: "{{namespace}}"
