name: Kong Hot Reload
description: Re-run init_worker on the live Kong pod to pick up edits to the Lua plugin source under code/services/kong/lua/. Use after hand-editing handler.lua or schema.lua during plugin development.
tags: [gateway, kong, dev]
prerequisites:
  - description: Kong service exists
    check: service_exists
    params:
      id: kong
variables:
  - name: deploy_target
    alias: d
    description: '<run-spec>/<deploy-name> — context for service start/stop/restart steps (e.g. app/development-local)'
    type: deploy-target
    required: true
  - name: namespace
    alias: n
    description: Namespace where Kong is running
    type: string
    default: main
steps:
  - name: Reload kong in {{namespace}}
    tool: service_reload
    params:
      id: kong
      deploy_target: "{{deploy_target}}"
