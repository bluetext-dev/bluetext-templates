name: Kong Proxy
description: Wire frontend and API services through Kong — same-origin routing, no auth
tags: [gateway, kong]
prerequisites:
  - description: Kong service exists
    check: service_exists
    params:
      id: "{{gateway}}"
variables:
  - name: deploy_target
    alias: d
    description: '<run-spec>/<deploy-name> — context for service start/stop/restart steps (e.g. app/development-local)'
    type: deploy-target
    required: true
  - name: gateway
    alias: g
    description: Which Kong service to configure (kong or kong-enterprise)
    type: service
    default: kong
  - name: namespace
    alias: n
    description: Namespace where services are running
    type: string
    default: main
  - name: targets
    alias: t
    description: Backend services to route through Kong
    type: service
    multiple: true
    required: true
  - name: frontend
    alias: f
    description: Frontend service to wire through Kong (updates ingress + API URL)
    type: service
    accepts: [web-app, flutter]
    required: true
see_also: [auth/kong-phantom-token]
steps:
  - name: Write Kong declarative config
    tool: file_write
    params:
      file: "config/{{gateway}}/kong.yaml"
      content_file: files/kong-declarative.yaml
  - name: Route target services through Kong
    for_each: targets
    steps:
      - name: "Remove direct ingress for {{item}}"
        tool: file_delete
        params:
          file: "config/k8s/{{item}}/{{item}}/base/ingress.yaml"
      - name: "Add gateway annotation to {{item}}"
        tool: file_patch
        params:
          file: "config/k8s/{{item}}/{{item}}/base/deployment.yaml"
          operation: merge
          match_kind: Deployment
          path: spec.template.metadata.annotations
          content: |
            bluetext.io/gateway: "{{gateway}}"
      - name: "Add Kong route for {{item}}"
        tool: file_patch
        params:
          file: "config/{{gateway}}/kong.yaml"
          operation: append_list
          path: services
          content: |
            - name: "{{item}}"
              url: "http://{{item}}"
              routes:
                - name: "{{item}}-route"
                  paths:
                    - "/{{item}}"
                  strip_path: true
      - name: "Register gateway relationship for {{item}}"
        tool: file_patch
        params:
          file: config/bluetext.yaml
          operation: append_list
          path: relationships
          content: |
            - from: "{{gateway}}"
              to: "{{item}}"
              type: gateway
              label: Routes traffic to
              blueprint: gateway/kong-proxy
  - name: "Update frontend ingress — route /api to Kong"
    tool: file_write
    params:
      file: "config/k8s/{{frontend}}/{{frontend}}/base/ingress.yaml"
      content_file: files/frontend-ingress.yaml
  - name: "Update frontend dev overlay — point API to Kong"
    tool: file_write
    params:
      file: "config/k8s/{{frontend}}/{{frontend}}/_default/patches.yaml"
      content_file: files/frontend-dev-patches.yaml
  - name: "Register frontend-kong relationship"
    tool: file_patch
    params:
      file: config/bluetext.yaml
      operation: append_list
      path: relationships
      content: |
        - from: "{{frontend}}"
          to: "{{gateway}}"
          type: gateway
          label: Routes API calls through
          blueprint: gateway/kong-proxy
  - name: "Reload {{gateway}}"
    tool: service_reload
    params:
      id: "{{gateway}}"
      deploy_target: "{{deploy_target}}"
  - name: "Restart frontend"
    tool: service_restart
    params:
      id: "{{frontend}}"
      deploy_target: "{{deploy_target}}"
