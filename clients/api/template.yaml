id: api
name: API Client
description: TypeScript API client for server-side fetch via Traefik ingress
dependencies: []
default_prefix: API
env_vars:
  - suffix: URL
    description: In-cluster Traefik URL for proxying API requests
    default: "http://traefik.kube-system.svc.cluster.local"
  - suffix: HOST
    description: Traefik Host header for routing to the API service
    default: "{{upstream}}.{{upstream_ns}}.bluetext.localhost"
