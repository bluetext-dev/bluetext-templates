name: Basic Auth with Curity
description: Minimal authentication stack — Curity IdP with OAuth2, OIDC, and user registration
caveats:
  - Requires a Curity license key — get a free trial at developer.curity.io (on a bluetext VM, it is pre-set as $CURITY_LICENSE_KEY)
  - Uses default admin password "admin" — change for non-dev environments
tips:
  - Register test users at curity.main.bluetext.localhost/authn/registration
  - Admin UI available at curity-admin.main.bluetext.localhost
  - Pre-configured client — flutter-app (public, PKCE)
pitfalls:
  - The license secret must be created before starting Curity
steps:
  - run: b service add curity --var license_key=$CURITY_LICENSE_KEY
    description: Add the Curity Identity Server with license secret
  - run: b service start curity
    description: Start Curity with HSQLDB (admin UI available immediately)
  - run: b bp run auth/curity-oauth --no-restart
    description: Configure OAuth2 profiles, clients (flutter-app), and scopes
  - run: b service restart curity
    description: Pick up OAuth2 configuration — restarts Curity once after all config is written
