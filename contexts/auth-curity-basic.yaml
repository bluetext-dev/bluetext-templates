name: Basic Auth with Curity
description: Minimal authentication stack — Curity IdP with OAuth2, OIDC, and user registration
caveats:
  - Uses default admin password "admin" — change for non-dev environments
  - Reads the license from `$CURITY_LICENSE_KEY` in the calling shell (free trial at developer.curity.io)
tips:
  - "Open the Curity login form at curity.rs--development--auth--main.bluetext.localhost/authn"
  - "Admin UI: curity-admin.rs--development--auth--main.bluetext.localhost"
  - Pre-configured client — flutter-app (public, PKCE)
pitfalls:
  - The license secret must be written to the secret store before starting Curity
steps:
  - run: b service add curity
    description: Add the Curity Identity Server abstract
  - run: b secret set fixed/curity-license-key --from-env CURITY_LICENSE_KEY
    description: Write the license JWT to the secret store (the deploy pipeline composes the JSON wrapper Curity expects)
  - run: b run-spec set auth -s curity
    description: Compose Curity into a single-service run-spec
  - run: b run-spec deploy add auth development-local -v development -c k3d-local
    description: Add the development-local deploy entry pairing run-spec-variant `development` with the k3d-local cluster
  - run: b bp run auth/curity-hsqldb --no-restart --var deploy_target=auth/development-local
    description: Configure HSQLDB as the data store (accounts, tokens, sessions)
  - run: b bp run auth/curity-oauth --no-restart --var deploy_target=auth/development-local
    description: Configure OAuth2 profiles, clients (flutter-app), and scopes
  - run: b deploy auth/development-local
    description: Render manifests and apply the run-spec to the local cluster
