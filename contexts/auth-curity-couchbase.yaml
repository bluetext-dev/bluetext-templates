name: Curity with Couchbase
description: Curity IdP backed by Couchbase — unified data store for accounts, tokens, sessions, and credentials
variables:
  - name: license_key
    alias: l
    description: Curity license key (free trial at developer.curity.io)
    type: string
    required: true
caveats:
  - First Curity build takes several minutes (downloads Gradle, JDK, and Couchbase plugin dependencies)
  - Couchbase admin credentials are Administrator/password — change for non-dev environments
tips:
  - "Couchbase UI: couchbase.rs--development--auth--main.bluetext.localhost"
  - "Curity login: curity.rs--development--auth--main.bluetext.localhost/authn"
  - service-config-manager creates the 15 Curity collections and enables Analytics on the curity bucket
pitfalls:
  - Couchbase must be fully initialized before Curity connects — service-config-manager handles this
  - service-config-manager must be running for Couchbase bucket configuration
steps:
  - run: b service add couchbase
    description: Add the Couchbase database service
  - run: b service add service-config-manager
    description: Add the service config manager (handles Couchbase bucket setup)
  - run: b service add curity --var license_key={{license_key}}
    description: Add the Curity Identity Server with license secret
  - run: b run-spec set auth -s couchbase,service-config-manager,curity
    description: Compose the three services into a single run-spec
  - run: b bp run database/service-config-manager-register --var service=couchbase --no-restart -s auth
    description: Wire service-config-manager to Couchbase (injects connection env vars)
  - run: b bp run auth/curity-couchbase --no-restart -s auth
    description: Switch Curity's data source from HSQLDB to Couchbase
  - run: b bp run auth/curity-oauth --no-restart -s auth
    description: Configure OAuth2 profiles, clients (flutter-app), and scopes
  - run: b deploy run auth
    description: Render manifests, build images, and apply the run-spec to the local cluster
