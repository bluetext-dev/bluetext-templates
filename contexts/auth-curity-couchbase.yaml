name: Curity with Couchbase
description: Curity IdP backed by Couchbase — unified data store for accounts, tokens, sessions, and credentials
caveats:
  - Requires a Curity license key — get a free trial at developer.curity.io (on a bluetext VM, it is pre-set as $CURITY_LICENSE_KEY)
  - First Curity build takes several minutes (downloads Gradle, JDK, and Couchbase plugin dependencies)
  - Curity may restart once or twice while Couchbase initializes — this is normal
  - Couchbase admin credentials are Administrator/password — change for non-dev environments
tips:
  - Couchbase UI at couchbase.main.bluetext.localhost
  - Register test users at curity.main.bluetext.localhost/authn/registration
  - The Couchbase plugin auto-creates collections (curity-accounts, curity-tokens, etc.) on first startup
pitfalls:
  - Couchbase must be fully initialized before Curity starts — the init Job handles this, but give it time
  - service-config-manager must be running for Couchbase bucket configuration
steps:
  - run: b service add couchbase
    description: Add the Couchbase database service
  - run: b service add service-config-manager
    description: Add the service config manager (handles Couchbase bucket setup)
  - run: b service add curity --var license_key=$CURITY_LICENSE_KEY
    description: Add the Curity Identity Server with license secret
  - run: b service start couchbase
    description: Start Couchbase (wait for cluster initialization)
  - run: b service start service-config-manager
    description: Start the service config manager
  - run: b service start curity
    description: Start Curity (initial start with HSQLDB defaults)
  - run: b bp run auth/curity-couchbase --no-restart
    description: Switch Curity's data source from HSQLDB to Couchbase
  - run: b bp run auth/curity-oauth --no-restart
    description: Configure OAuth2 profiles, clients (flutter-app), and scopes
  - run: b service restart couchbase
    description: Pick up init Job for curity bucket creation
  - run: b service restart curity
    description: Pick up Couchbase data source + OAuth2 configuration
