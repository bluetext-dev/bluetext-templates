name: Curity with Couchbase
description: Curity IdP backed by Couchbase — unified data store for accounts, tokens, sessions, and credentials
variables:
  - name: license_key
    alias: l
    description: Curity license key (free trial at developer.curity.io)
    type: string
    required: true
caveats:
  - First Curity build pulls the pre-built Couchbase plugin tarball (~16 MiB) from gs://bluetext-cli-releases/plugins/ and extracts it into the image — fast, no JDK/Gradle compile step
  - Couchbase admin credentials are Administrator/password — change for non-dev environments
  - Requires a Curity license that allows custom data-source types; for licenses restricted to JDBC, swap auth/curity-couchbase for auth/curity-couchbase-jdbc
tips:
  - "Couchbase UI: couchbase.rs--development--auth--main.bluetext.localhost"
  - "Curity login: curity.rs--development--auth--main.bluetext.localhost/authn"
  - The plugin self-provisions the curity bucket (256 MiB, configurable via `<bucket-ram-quota-mb>`), the configured scope, ten curity-* collections, and primary indexes on first connect (auto-provision=true by default)
pitfalls:
  - Couchbase initial cluster setup happens via the per-system managed-state crate; the Curity plugin then provisions its own bucket and collections on first connect
steps:
  - run: b service add couchbase
    description: Add the Couchbase database service
  - run: b service add curity --var license_key={{license_key}}
    description: Add the Curity Identity Server with license secret
  - run: b run-spec set auth -s couchbase,curity
    description: Compose the three services into a single run-spec
  - run: b bp run auth/curity-couchbase --no-restart --var deploy_target=auth/development-local
    description: Switch Curity's data source from HSQLDB to Couchbase (plugin self-provisions bucket + collections + indexes on first connect)
  - run: b bp run auth/curity-oauth --no-restart --var deploy_target=auth/development-local
    description: Configure OAuth2 profiles, clients (flutter-app), and scopes
  - run: b deploy auth/development-local
    description: Render manifests, build images, and apply the run-spec to the local cluster
