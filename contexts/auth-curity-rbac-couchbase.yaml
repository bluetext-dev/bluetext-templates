name: RBAC Auth with Curity + Couchbase
description: Full RBAC stack backed by Couchbase — Curity (IdP) + Kong (gateway) + API (role guards) + Flutter app
variables:
  - name: app_id
    alias: a
    description: App ID for OIDC configuration
    type: string
    default: flutter
caveats:
  - First Curity build pulls the pre-built Couchbase plugin tarball (~16 MiB) from gs://bluetext-cli-releases/plugins/ and extracts it into the image — fast, no JDK/Gradle compile step
  - Requires a Curity license that allows custom data-source types; for licenses restricted to JDBC, swap auth/curity-couchbase for auth/curity-couchbase-jdbc
  - Kong adds introspection latency per request (mitigated by 300s token caching)
  - The API trusts the JWT from Kong without signature verification (Kong already validated it)
  - First Flutter image pull is ~1.9GB — cached globally after first pull via registry mirror
tips:
  - "Create users: b bp run auth/curity-create-users --var users=alice:Pass1,bob:Pass2 --var deploy_target=rbac/development-local"
  - "Assign roles: b bp run auth/curity-assign-roles --var users=alice:admin,bob:moderator --var deploy_target=rbac/development-local"
  - "Couchbase UI: couchbase.rs--development--rbac--main.bluetext.localhost"
  - The plugin self-provisions the curity bucket (256 MiB, configurable via `<bucket-ram-quota-mb>`), the configured scope, ten curity-* collections, and primary indexes on first connect (auto-provision=true by default)
  - The {{app_id}} service auto-configures ADB reverse (emulator:8888 → host:80) for ingress access on start
pitfalls:
  - Don't skip auth/curity-oauth — phantom-token needs the introspect endpoint configured
  - Couchbase initial cluster setup happens via the per-system managed-state crate (the v3 replacement for the retired service-config-manager); the plugin then provisions its own bucket and collections
  - The API routes through Kong — direct API ingress is removed
steps:
  - run: b service add couchbase
    description: Add the Couchbase database service
  - run: b service add curity
    description: Add the Curity Identity Server abstract
  - run: b secret set fixed/curity-license-key --from-env CURITY_LICENSE_KEY
    description: Write the Curity license JWT to the secret store (free trial at developer.curity.io; export CURITY_LICENSE_KEY in your shell first)
  - run: b service add kong
    description: Add the Kong API Gateway
  - run: b service add api
    description: Add the API service
  - run: b service add {{app_id}}
    description: Add the {{app_id}} service
  - run: b run-spec set rbac -s couchbase,curity,kong,api,{{app_id}}
    description: Compose the five services into a single run-spec
  - run: b run-spec deploy add rbac development-local -v development -c k3d-local
    description: Add the development-local deploy entry pairing run-spec-variant `development` with the k3d-local cluster
  - run: b bp run auth/curity-couchbase --no-restart --var deploy_target=rbac/development-local
    description: Switch Curity to Couchbase (plugin self-provisions bucket + 10 curity-* collections + indexes; deploys custom Curity image with the plugin)
  - run: b bp run auth/curity-oauth --no-restart --var deploy_target=rbac/development-local
    description: Configure OAuth2 profiles, clients (flutter-app), and scopes
  - run: b bp run auth/kong-phantom-token --var targets=api --no-restart --var deploy_target=rbac/development-local
    description: Configure Kong with phantom token introspection, route API traffic through it
  - run: b bp run auth/api-rbac --var d=couchbase --no-restart --var deploy_target=rbac/development-local
    description: Add role-guarded routes with Couchbase claim provider, SCIM user management, claims mapper
  - run: b bp run auth/app-oidc --var app_id={{app_id}} --no-restart --var deploy_target=rbac/development-local
    description: Add OIDC login flow to the app
  - run: b deploy rbac/development-local
    description: Render manifests, build images, and apply the run-spec to the local cluster
  - run: b bp run auth/curity-create-users --var users=alice:Password1,bob:Password1 --var deploy_target=rbac/development-local
    description: Create test user accounts with passwords
  - run: b bp run auth/curity-assign-roles --var users=alice:admin,bob:moderator --var deploy_target=rbac/development-local
    description: Assign roles to the test users
