name: RBAC Auth with Curity
description: Full authentication stack with role-based access control — Curity (IdP) + Kong (gateway enforcement) + API (service-level role guards) + Flutter app (OIDC login)
caveats:
  - Requires a Curity license key — get a free trial at developer.curity.io (on a bluetext VM, it is pre-set as $CURITY_LICENSE_KEY)
  - Kong adds introspection latency per request (mitigated by 300s token caching)
  - API trusts the JWT from Kong without signature verification (Kong already validated it)
  - First Flutter image pull is ~1.9GB — cached globally after first pull via registry mirror
tips:
  - "Create users: b bp run auth/curity-create-users --var users=alice:Pass1,bob:Pass2"
  - "Assign roles: b bp run auth/curity-assign-roles --var users=alice:admin,bob:moderator"
  - b app start auto-configures ADB reverse (emulator:8888 → host:80) for ingress access
  - "If Chrome Custom Tab fails after wiping HSQLDB, clear Chrome data: adb shell pm clear com.android.chrome"
pitfalls:
  - Don't skip auth/curity-oauth — phantom-token needs the introspect endpoint configured
  - The API routes through Kong — direct API ingress is removed
  - After clearing Chrome, complete Chrome's first-run prompts before retrying the app
steps:
  - run: b service add curity --var license_key=$CURITY_LICENSE_KEY
    description: Add the Curity Identity Server with license secret
  - run: b service add kong
    description: Add the Kong API Gateway
  - run: b service add api
    description: Add the API service
  - run: b app add flutter
    description: Add the Flutter mobile app
  - run: b bp run auth/curity-oauth --no-restart
    description: Configure OAuth2 profiles, clients (flutter-app), and scopes
  - run: b bp run auth/kong-phantom-token --var targets=api --no-restart
    description: Configure Kong with phantom token introspection, route API traffic through it
  - run: b bp run auth/api-rbac --no-restart
    description: Add role-guarded routes, SCIM user management profile, and claims mapper
  - run: b bp run auth/app-oidc --var app_id=flutter --no-restart
    description: Add OIDC login flow to the Flutter app
  - run: b service start curity kong api
    description: Start all services (picks up all config at once)
  - run: b app start flutter
    description: Start Flutter app (builds image, sets up ADB reverse for emulator)
  - run: b bp run auth/curity-create-users --var users=alice:Password1,bob:Password1
    description: Create test user accounts with passwords
  - run: b bp run auth/curity-assign-roles --var users=alice:admin,bob:moderator
    description: Assign roles to the test users
