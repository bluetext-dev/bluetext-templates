apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
      containers:
        - name: api
          image: bluetext-api:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 3030
          readinessProbe:
            httpGet:
              path: /health
              port: 3030
            initialDelaySeconds: 2
            periodSeconds: 5
            failureThreshold: 6
          env:
            - name: PORT
              value: "3030"
      volumes:
        - name: project
          hostPath:
            path: /var/mnt/project/code/services/api
            type: Directory
        - name: clients
          hostPath:
            path: /var/mnt/project/code/clients
            type: Directory
        - name: models
          hostPath:
            path: /var/mnt/project/code/models
            type: Directory
