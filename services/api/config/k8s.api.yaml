apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  annotations:
    bluetext.io/dev-command: "cargo watch -x run"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
      containers:
        - name: api
          image: bluetext-api:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 3030
          readinessProbe:
            httpGet:
              path: /health
              port: 3030
            initialDelaySeconds: 2
            periodSeconds: 5
            failureThreshold: 6
          env:
            - name: PORT
              value: "3030"
      volumes:
        - name: project
          hostPath:
            path: /var/mnt/project/code/services/api
            type: Directory
---
apiVersion: v1
kind: Service
metadata:
  name: api
spec:
  type: ClusterIP
  selector:
    app: api
  ports:
    - port: 80
      targetPort: 3030
