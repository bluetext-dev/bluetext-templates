apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
      containers:
        - name: api
          image: bluetext-api:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 3030
          readinessProbe:
            httpGet:
              path: /health
              port: 3030
            initialDelaySeconds: 2
            periodSeconds: 5
            failureThreshold: 6
          env:
            - name: PORT
              value: "3030"
      volumes:
        - name: project
          hostPath:
            path: /var/mnt/project/code/services/api
            type: Directory
        - name: clients
          hostPath:
            path: /var/mnt/project/code/clients
            type: Directory
        - name: models
          hostPath:
            path: /var/mnt/project/code/models
            type: Directory
---
apiVersion: v1
kind: Service
metadata:
  name: api
spec:
  type: ClusterIP
  selector:
    app: api
  ports:
    - port: 80
      targetPort: 3030
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: api
spec:
  ingressClassName: traefik
  rules:
    - host: api.{{NAMESPACE}}.bluetext.localhost
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: api
                port:
                  number: 80
