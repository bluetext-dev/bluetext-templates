apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../base
images:
  - name: api
    newName: k3d-bluetext.localhost:5111/api
    newTag: latest
patches:
  - path: patches.yaml
  - target:
      kind: Ingress
      name: api
    patch: |
      - op: replace
        path: /spec/rules/0/host
        value: api.{{NAMESPACE}}.bluetext.localhost
      - op: add
        path: /spec/ingressClassName
        value: traefik
