apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  annotations:
    bluetext.io/dev-command: "cargo watch -x run"
spec:
  template:
    spec:
      containers:
        - name: api
          imagePullPolicy: Never
      volumes:
        - name: project
          hostPath:
            path: /var/mnt/project/code/services/api
            type: Directory
        - name: clients
          hostPath:
            path: /var/mnt/project/code/clients
            type: Directory
        - name: models
          hostPath:
            path: /var/mnt/project/code/models
            type: DirectoryOrCreate
