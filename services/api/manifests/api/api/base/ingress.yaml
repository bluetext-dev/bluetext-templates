apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: api--api
spec:
  ingressClassName: traefik
  rules:
    - host: api.$bt{{ deploy::namespace }}.bluetext.localhost
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: api--api
                port:
                  number: 80
