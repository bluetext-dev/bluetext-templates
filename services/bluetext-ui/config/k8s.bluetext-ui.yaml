apiVersion: apps/v1
kind: Deployment
metadata:
  name: bluetext-ui
spec:
  replicas: 1
  selector:
    matchLabels:
      app: bluetext-ui
  template:
    metadata:
      labels:
        app: bluetext-ui
    spec:
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
      containers:
        - name: app
          image: oven/bun:latest
          command: ["sh", "-c", "cd /app && bun install && bun run dev"]
          ports:
            - containerPort: 5173
          volumeMounts:
            - name: project
              mountPath: /app
            - name: node-modules
              mountPath: /app/node_modules
      volumes:
        - name: project
          hostPath:
            path: /var/mnt/project/code/services/bluetext-ui
            type: Directory
        - name: node-modules
          hostPath:
            path: /var/mnt/project/.bluetext/cache/bluetext-ui/node_modules
            type: DirectoryOrCreate
---
apiVersion: v1
kind: Service
metadata:
  name: bluetext-ui
spec:
  type: ClusterIP
  selector:
    app: bluetext-ui
  ports:
    - port: 80
      targetPort: 5173
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: bluetext-ui
  annotations:
    traefik.ingress.kubernetes.io/custom-response-headers: "X-Accel-Buffering:no"
spec:
  ingressClassName: traefik
  rules:
    - host: bluetext.localhost
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: bluetext-ui
                port:
                  number: 80
