apiVersion: apps/v1
kind: Deployment
metadata:
  name: couchbase-edge-server
  annotations:
    bluetext.io/port-forwards: "couchbase-edge-server:59840:80"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: couchbase-edge-server
  template:
    metadata:
      labels:
        app: couchbase-edge-server
    spec:
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
      initContainers:
        - name: config-templater
          image: busybox:stable
          command: ['sh', '-c', 'sed "s/__NAMESPACE__/$POD_NAMESPACE/g" /config-template/config.json > /config/config.json']
          env:
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          volumeMounts:
            - name: config-template
              mountPath: /config-template
            - name: config
              mountPath: /config
      containers:
        - name: couchbase-edge-server
          image: couchbase/edge-server:latest
          imagePullPolicy: IfNotPresent
          command: ["couchbase-edge-server"]
          args: ["--verbose", "/etc/edge-server/config.json"]
          ports:
            - containerPort: 59840
              name: public
          readinessProbe:
            httpGet:
              path: /
              port: 59840
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 12
          volumeMounts:
            - name: config
              mountPath: /etc/edge-server/config.json
              subPath: config.json
      volumes:
        - name: config-template
          hostPath:
            path: /var/mnt/project/config/couchbase-edge-server
            type: Directory
        - name: config
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: couchbase-edge-server
spec:
  type: ClusterIP
  selector:
    app: couchbase-edge-server
  ports:
    - name: public
      port: 80
      targetPort: 59840
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: couchbase-edge-server
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
spec:
  ingressClassName: traefik
  rules:
    - host: couchbase-edge-server.{{NAMESPACE}}.bluetext.localhost
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: couchbase-edge-server
                port:
                  number: 80
