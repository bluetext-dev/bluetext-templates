id: couchbase-edge-server
name: Couchbase Edge Server
description: Couchbase Edge Server for offline-first sync with namespace-templated config
ports:
  - 59840
dev_mode: in-cluster
dependencies:
  - couchbase-sync-gateway
connection_profiles:
  sync:
    description: Sync API (WebSocket replication endpoint)
    prefix: COUCHBASE_EDGE_SERVER
    env_vars:
      - suffix: HOST
        default: "{{upstream}}.{{upstream_ns}}.svc.cluster.local"
      - suffix: PORT
        default: "59840"
