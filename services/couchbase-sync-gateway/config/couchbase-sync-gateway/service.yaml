id: couchbase-sync-gateway
name: Couchbase Sync Gateway
description: Couchbase Sync Gateway with namespace-templated config
use:
  couchbase-sync-gateway: [_default]
interfaces:
  - public        # document sync + authentication
  - admin         # database creation, configuration
connection-profiles:
  public:
    interface: public
  admin:
    interface: admin
