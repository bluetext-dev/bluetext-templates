kind: store
name: Couchbase Server
description: Couchbase Server (in-cluster) with a Capella alternate variant
# `b service add couchbase` ships both variants. Initial `use:` binds
# `server` (the in-cluster Couchbase Server image) to every run-spec-
# variant. To deploy against Capella in staging/production, edit:
#   use:
#     development: server
#     test:        server
#     staging:     capella
#     production:  capella
# Then populate ~/.bluetext/secrets/<sys>--<hash>/variants/staging/
# (and production/) with `api-couchbase-client-cert` + `-client-key`.
use:
  _default: server
interfaces:
  - client    # SDK / KV / query / search
  - admin     # management API (cluster init, bucket CRUD)
connection-profiles:
  data-writer:
    interface: client
    secret: variant::auth
  ops:
    interface: admin
    secret: variant::auth
