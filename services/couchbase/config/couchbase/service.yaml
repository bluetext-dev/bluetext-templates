name: Couchbase Server
description: Couchbase Server (in-cluster) with a Capella alternate variant
# `b service add couchbase` ships both variants. Default binding:
#   • production → capella (managed cloud — what real prod targets)
#   • everything else → server (local in-cluster image for dev/test/staging)
# Override the production default by editing this map or via the UI
# (Configure → Components → couchbase → Variant binding). When
# capella binds, populate ~/.bluetext/secrets/<sys>--<hash>/variants/production/
# (or whichever rsv) with `api-couchbase-client-cert` + `-client-key`.
use:
  _default:   server
  production: capella
interfaces:
  - client    # SDK / KV / query / search
  - admin     # management API (cluster init, bucket CRUD)
connection-profiles:
  data-writer:
    interface: client
    secret: variant::auth
  ops:
    interface: admin
    secret: variant::auth
api-config-bundles:
  - couchbase/base                # config/api/couchbase/base/ — bucket/scope/collection provisioning
api-config-peers:
  - name: self
    service: couchbase
    profile: ops                  # admin REST API + auth credentials at /etc/bluetext/peers/self/
