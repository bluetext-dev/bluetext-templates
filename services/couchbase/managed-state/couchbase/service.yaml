id: couchbase
kind: managed-state
name: Couchbase migrations
description: |
  Worked-example managed-state crate. Provisions buckets, scopes, and
  collections via the Couchbase admin REST API. Idempotent —
  re-running on an existing bucket is a no-op.

# Mounts the Couchbase `ops` connection-profile at
# /etc/bluetext/links/admin/. The bound variant's secret declaration
# (server.yaml's `secrets.auth`) supplies `username` + `password`.
links:
  admin: couchbase/ops
