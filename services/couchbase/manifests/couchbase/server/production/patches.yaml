apiVersion: apps/v1
kind: Deployment
metadata:
  name: couchbase--server
spec:
  template:
    spec:
      containers:
        - name: couchbase--server
          imagePullPolicy: Always
          resources:
            requests:
              memory: "2Gi"
              cpu: "1"
            limits:
              memory: "4Gi"
              cpu: "2"
