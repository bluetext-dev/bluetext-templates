# Curity api-config bundle — declared end-state.
#
# Authored against Curity's RESTCONF schema; each entry was originally
# meant to map 1-to-1 to a JSON body the bundle's handlers POST to
# /admin/api/restconf/data on the admin port (6749).
#
# **Current scope (Curity 11.2.0, license schema 4.3):** RESTCONF on
# this Curity version permits READ on every path under `/admin/api/restconf/data`
# but refuses CREATE on profile / client / scope / role list-key URIs.
# Probed live 2026-05-17:
#
#   PUT  /base:profiles/profile=<id>      → 404 "uri keypath not found"
#   POST /base:profiles                   → 403 "access denied"
#
# The list-key URL form is not exposed for these resources regardless
# of the operator role; Curity's canonical install surface for them is
# the file-based `/opt/idsvr/etc/init/*.xml` init dir (the same path
# the file-based license install uses, mounted via the deployment's
# config-templater init container). That's what the `auth/curity-oauth`
# and `auth/api-rbac` blueprints already write to.
#
# This bundle's load-bearing migration is **001-verify-license**: it
# probes the admin RESTCONF root to fail loudly when the file-based
# license install didn't take effect — before any blueprint or
# downstream service expects a working OAuth surface. The handler set
# (ensure_oauth_profiles / ensure_clients / ensure_scopes /
# ensure_roles) remains in the source tree for a later Curity version
# whose RESTCONF surface supports CREATE on these list-key URIs; the
# state.yaml sections were emptied here so the Job's ensure_state pass
# is a clean no-op against the current API.
#
# See services/curity/README.md for the hybrid bootstrap architecture.

# Intentionally empty: every section above is XML-installed for now.
