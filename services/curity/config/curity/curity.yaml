id: curity
implements: curity
interfaces:
  oidc:
    port: 8443
    protocol: https
  admin:
    port: 6749
    protocol: https
secrets:
  license:
    keys:
      # Curity's idsvr expects the license file as a JSON wrapper around
      # the raw JWT: `{"License": "<jwt>"}`. The deploy pipeline reads the
      # raw JWT from `~/.bluetext/secrets/<sys>--<hash>/fixed/curity-license-key`
      # and composes the wrapper at render time.
      license-key: '{"License":"{{secrets::fixed/curity-license-key}}"}'
mounts:
  # Materialise `curity--license` Secret in the curity namespace so the
  # base deployment's volume mount finds it. The Secret is `optional: true`
  # in the manifest, but Curity's idsvr requires the license to start —
  # `b secret set fixed/curity-license-key --from-env CURITY_LICENSE_KEY`
  # before deploy.
  - variant::license
