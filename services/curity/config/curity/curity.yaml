interfaces:
  oidc:
    port: 8443
    protocol: https
  admin:
    port: 6749
    protocol: https
connection-profiles:
  # Reserved api-config profile. Variant-level (vs the oidc/jwks/introspection
  # profiles on the abstract) because admin credentials are variant-bound:
  # the bootstrap-admin password lives in the local secret store and rotates
  # to the operator-set value on first Job run.
  api-config:
    interface: admin
    secret: variant::admin-credentials
secrets:
  admin-credentials:
    # license-key bundled into the admin-credentials Secret because
    # api_config_peers.rs projects one secret per peer. The license JWT
    # is consumed by the post_license handler alongside the admin
    # username/password, and projecting both through the same Secret
    # keeps the peer projection model uniform.
    keys:
      username:    secrets::fixed/curity-admin-username
      password:    secrets::fixed/curity-admin-password
      license-key: secrets::fixed/curity-license-key
