name: Curity Identity Server
description: OAuth 2.0 and OpenID Connect Identity Server
use:
  _default: curity
interfaces:
  - oidc          # OAuth2 / OIDC endpoints (authorize, token, JWKS, userinfo)
  - admin         # admin UI + management API
connection-profiles:
  oidc:
    interface: oidc
  jwks:
    interface: oidc
  introspection:
    interface: oidc
api-config-bundles:
  - curity/base                 # config/api/curity/base/ — license install + OAuth profiles + clients + scopes + roles
api-config-peers:
  - name: self
    service: curity
    profile: api-config         # variant-level profile on curity.yaml; projects admin creds at /etc/bluetext/peers/self/
