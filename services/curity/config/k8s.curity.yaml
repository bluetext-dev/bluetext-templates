apiVersion: apps/v1
kind: Deployment
metadata:
  name: curity
spec:
  replicas: 1
  selector:
    matchLabels:
      app: curity
  template:
    metadata:
      labels:
        app: curity
    spec:
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
      initContainers:
        - name: clean-init-config
          image: busybox:1.36
          command: ["sh", "-c", "rm -f /init/admin-user-conf.xml /init/key-conf.xml"]
          volumeMounts:
            - name: init-config
              mountPath: /init
      containers:
        - name: curity
          image: curity.azurecr.io/curity/idsvr:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8443
              name: runtime
            - containerPort: 6749
              name: admin
          env:
            - name: PASSWORD
              value: admin
            - name: LICENSE_KEY
              valueFrom:
                secretKeyRef:
                  name: curity-license
                  key: license-key
                  optional: true
          readinessProbe:
            httpGet:
              path: /admin/alive
              port: 6749
              scheme: HTTPS
            initialDelaySeconds: 15
            periodSeconds: 5
            failureThreshold: 12
          volumeMounts:
            - name: init-config
              mountPath: /opt/idsvr/etc/init
            - name: hsqldb-data
              mountPath: /opt/idsvr/var/hsqldb
      volumes:
        - name: init-config
          hostPath:
            path: /var/mnt/project/config/curity
            type: DirectoryOrCreate
        - name: hsqldb-data
          hostPath:
            path: /var/mnt/project/.bluetext/curity-db
            type: DirectoryOrCreate
---
apiVersion: v1
kind: Service
metadata:
  name: curity
spec:
  type: ClusterIP
  selector:
    app: curity
  ports:
    - name: runtime
      port: 80
      targetPort: 8443
---
apiVersion: v1
kind: Service
metadata:
  name: curity-admin
spec:
  type: ClusterIP
  selector:
    app: curity
  ports:
    - name: admin
      port: 80
      targetPort: 6749
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: curity
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
    traefik.ingress.kubernetes.io/service.serversscheme: https
spec:
  ingressClassName: traefik
  rules:
    - host: curity.{{NAMESPACE}}.local.bluetext.io
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: curity
                port:
                  number: 80
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: curity-admin
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
    traefik.ingress.kubernetes.io/service.serversscheme: https
spec:
  ingressClassName: traefik
  rules:
    - host: curity-admin.{{NAMESPACE}}.local.bluetext.io
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: curity-admin
                port:
                  number: 80
