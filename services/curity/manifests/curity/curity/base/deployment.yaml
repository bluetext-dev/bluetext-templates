apiVersion: apps/v1
kind: Deployment
metadata:
  name: curity--curity
  annotations:
    # `idsvr -r` reloads etc/init XML and merges with the running config —
    # ConfD-backed dynamic reload, no process restart, no downtime.
    bluetext.io/reload-command: "idsvr -r"
    bluetext.io/reload-watch: "config/curity"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: curity--curity
  template:
    metadata:
      labels:
        app: curity--curity
    spec:
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
      initContainers:
        - name: config-templater
          image: busybox:stable
          # Two-step init: (a) namespace-stamp the XML init configs from
          # the hostPath /config-template into the emptyDir /config (which
          # mounts at /opt/idsvr/etc/init on the main container), then
          # (b) copy the license JSON from the mounted Secret at
          # /license-source into /config/license/default.
          #
          # The license can't be a direct mount at
          # /opt/idsvr/etc/init/license because that path is nested inside
          # the init-config emptyDir mount; k3d/containerd produces an
          # empty inner dir on nested mounts. Copy via this init container
          # instead — Curity's startup scanner reads any file under
          # /opt/idsvr/etc/init/license/ and parses it as JSON-wrapped JWT.
          #
          # The api-config Job (post-apply) handles the post-license
          # RESTCONF surface (OAuth profiles, clients, scopes, roles).
          # License install itself is NOT API-installable on Curity —
          # see services/curity/README.md and curity.yaml::secrets.license.
          command:
            - sh
            - -c
            - |
              set -e
              for f in /config-template/*.xml; do
                sed "s/__NAMESPACE__/$POD_NAMESPACE/g" "$f" > "/config/$(basename $f)"
              done
              mkdir -p /config/license
              if [ -f /license-source/license-key ]; then
                cp /license-source/license-key /config/license/default
              fi
          env:
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          volumeMounts:
            - name: config-template
              mountPath: /config-template
            - name: init-config
              mountPath: /config
            - name: license
              mountPath: /license-source
              readOnly: true
        - name: init-db
          # HSQLDB schema-init. Idempotent: skips when the schema file
          # already exists, so re-deploys are no-ops. The image ships
          # SqlTool + the canonical hsqldb-create_database.sql at
          # /opt/idsvr/etc/. Runs unconditionally — when Curity is wired
          # to a different datasource (Couchbase via auth/curity-couchbase
          # blueprints), the resulting schema file is unused but harmless,
          # avoiding a kustomize-overlay patch for the dev-default case.
          image: curity.azurecr.io/curity/idsvr:latest
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - |
              set -e
              if [ ! -f /hsqldb/curity.script ] || ! grep -q "CREATE TABLE" /hsqldb/curity.script; then
                java -cp "/opt/idsvr/lib/hsqldb-cli/sqltool-2.7.2.jar:/opt/idsvr/lib/hsqldb-cli/hsqldb-2.7.2.jar" \
                  org.hsqldb.cmdline.SqlTool \
                  --autoCommit \
                  --inlineRc="url=jdbc:hsqldb:file:/hsqldb/curity,user=,password=" \
                  /opt/idsvr/etc/hsqldb-create_database.sql
              fi
          volumeMounts:
            - name: hsqldb-data
              mountPath: /hsqldb
      containers:
        - name: curity--curity
          image: curity.azurecr.io/curity/idsvr:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8443
              name: runtime
            - containerPort: 6749
              name: admin
          env:
            - name: PASSWORD
              value: admin
          readinessProbe:
            httpGet:
              path: /admin/alive
              port: 6749
              scheme: HTTPS
            initialDelaySeconds: 15
            periodSeconds: 5
            failureThreshold: 12
          volumeMounts:
            - name: init-config
              mountPath: /opt/idsvr/etc/init
            - name: hsqldb-data
              mountPath: /opt/idsvr/var/hsqldb
      volumes:
        - name: config-template
          hostPath:
            path: /var/mnt/systems/$bt{{ deploy::system-rel }}/config/curity
            type: DirectoryOrCreate
        - name: init-config
          emptyDir: {}
        - name: hsqldb-data
          # Per-system hostPath so the schema survives pod restarts. Lives
          # outside the .bluetext/ cache (under the systems-dir root) so a
          # `b cache clean` doesn't wipe Curity's account/token store.
          hostPath:
            path: /var/mnt/systems/$bt{{ deploy::system-rel }}/.bluetext/curity-db
            type: DirectoryOrCreate
        - name: license
          secret:
            secretName: curity--license
            # No items: mapping. Curity scans every file in
            # /opt/idsvr/etc/init/license/ at startup and parses each
            # one as a JSON license wrapper. The deploy pipeline wraps
            # the raw JWT as {"License":"…"} via the curity.yaml
            # secrets.license.keys.license-key template.
