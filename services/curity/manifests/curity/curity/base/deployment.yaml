apiVersion: apps/v1
kind: Deployment
metadata:
  name: curity
  annotations:
    # `idsvr -r` reloads etc/init XML and merges with the running config —
    # ConfD-backed dynamic reload, no process restart, no downtime.
    bluetext.io/reload-command: "idsvr -r"
    bluetext.io/reload-watch: "config/curity"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: curity
  template:
    metadata:
      labels:
        app: curity
    spec:
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
      initContainers:
        - name: config-templater
          image: busybox:stable
          # The license Secret can't be mounted at /opt/idsvr/etc/init/license
          # directly because that path is inside the `init-config` emptyDir
          # mount; nested mounts produce an empty inner dir on k3d/containerd.
          # Workaround: mount the Secret at a sibling path (`/license-source`),
          # copy it into `/config/license/default` here. Curity's startup
          # scanner reads any file in `/opt/idsvr/etc/init/license/` and
          # parses it as a JSON license wrapper.
          command:
            - sh
            - -c
            - |
              set -e
              for f in /config-template/*.xml; do
                sed "s/__NAMESPACE__/$POD_NAMESPACE/g" "$f" > "/config/$(basename $f)"
              done
              mkdir -p /config/license
              if [ -f /license-source/license-key ]; then
                cp /license-source/license-key /config/license/default
              fi
          env:
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          volumeMounts:
            - name: config-template
              mountPath: /config-template
            - name: init-config
              mountPath: /config
            - name: license
              mountPath: /license-source
              readOnly: true
      containers:
        - name: curity
          image: curity.azurecr.io/curity/idsvr:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8443
              name: runtime
            - containerPort: 6749
              name: admin
          env:
            - name: PASSWORD
              value: admin
          readinessProbe:
            httpGet:
              path: /admin/alive
              port: 6749
              scheme: HTTPS
            initialDelaySeconds: 15
            periodSeconds: 5
            failureThreshold: 12
          volumeMounts:
            - name: init-config
              mountPath: /opt/idsvr/etc/init
      volumes:
        - name: config-template
          hostPath:
            path: /var/mnt/system/config/curity
            type: DirectoryOrCreate
        - name: init-config
          emptyDir: {}
        - name: license
          secret:
            secretName: curity--license
            # No items: mapping. Curity scans every file in
            # /opt/idsvr/etc/init/license/ at startup and parses each
            # one as a JSON license wrapper, so the projected key name
            # `license-key` is fine — the deploy pipeline wraps the
            # raw JWT as {"License":"…"} via the `secrets:` template
            # on the curity variant. Items mappings with `:latest`
            # symlink layouts don't project under k3d's containerd
            # image of secrets the way the spec implies, so we let
            # Kubernetes do the natural projection instead.
