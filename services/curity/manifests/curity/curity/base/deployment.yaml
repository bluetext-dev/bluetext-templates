apiVersion: apps/v1
kind: Deployment
metadata:
  name: curity--curity
  annotations:
    # `idsvr -r` reloads etc/init XML and merges with the running config —
    # ConfD-backed dynamic reload, no process restart, no downtime.
    bluetext.io/reload-command: "idsvr -r"
    bluetext.io/reload-watch: "config/curity"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: curity--curity
  template:
    metadata:
      labels:
        app: curity--curity
    spec:
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
      initContainers:
        - name: config-templater
          image: busybox:stable
          # Templates XML init config from /config-template (hostPath) into
          # /config (emptyDir mounted at /opt/idsvr/etc/init on the main
          # container). License delivery happens out-of-band via the api-config
          # Job's post_license handler against Curity's admin RESTCONF — the
          # file-based license channel (mounted Secret + cp into the init
          # tree) retired in Slice X3.
          command:
            - sh
            - -c
            - |
              set -e
              for f in /config-template/*.xml; do
                sed "s/__NAMESPACE__/$POD_NAMESPACE/g" "$f" > "/config/$(basename $f)"
              done
          env:
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          volumeMounts:
            - name: config-template
              mountPath: /config-template
            - name: init-config
              mountPath: /config
      containers:
        - name: curity--curity
          image: curity.azurecr.io/curity/idsvr:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8443
              name: runtime
            - containerPort: 6749
              name: admin
          env:
            - name: PASSWORD
              value: admin
          readinessProbe:
            httpGet:
              path: /admin/alive
              port: 6749
              scheme: HTTPS
            initialDelaySeconds: 15
            periodSeconds: 5
            failureThreshold: 12
          volumeMounts:
            - name: init-config
              mountPath: /opt/idsvr/etc/init
      volumes:
        - name: config-template
          hostPath:
            path: /var/mnt/systems/$bt{{ deploy::system-rel }}/config/curity
            type: DirectoryOrCreate
        - name: init-config
          emptyDir: {}
