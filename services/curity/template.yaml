id: curity
name: Curity Identity Server
description: OAuth 2.0 and OpenID Connect Identity Server
ports:
  - 8443
  - 6749
start_prerequisites:
  - description: Data store configured
    check: xml_element_exists
    params:
      file: config/curity/datasource.xml
      element: data-source
    hint: |
      Configure a data store for Curity:
        b bp run auth/curity-hsqldb           (embedded file-based, for development)
        b bp run auth/curity-couchbase        (Couchbase via native plugin — recommended)
        b bp run auth/curity-couchbase-jdbc   (Couchbase via JDBC wrapper — for licenses restricted to JDBC)
  - description: Curity license written to the secret store
    check: secret_exists
    params:
      id: fixed/curity-license-key
    hint: |
      Curity needs the license file to start. Free trial at developer.curity.io.
      Write it via the v3 secret store:
        b secret set fixed/curity-license-key --from-env CURITY_LICENSE_KEY
