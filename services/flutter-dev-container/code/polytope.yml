tools:
  {{ project-name }}:
    info: Flutter dev container with Android/iOS support and Couchbase Lite P2P
    inputs:
      restart-policy:
        info: Restart policy for the container
        type: [default, [enum, always, on-failure, never], always]
    run:
      - tool: polytope/python
        args:
          id: {{ project-name }}
          create: when-missing
          image: ghcr.io/cirruslabs/flutter:stable
          code: { type: repo, path: . }
          cmd: ./bin/run
          restart:
            policy: pt.input restart-policy
          services:
            - id: {{ project-name }}
              ports:
                - { protocol: tcp, port: pt.value {{ project-name }}-web-port, expose-as: pt.value {{ project-name }}-web-port }
          env:
            - { name: CHOKIDAR_USEPOLLING, value: "true" }
            - { name: SYNC_GATEWAY_URL, value: pt.value {{ project-name }}-sync-gateway-url }
            - { name: ADB_TARGET, value: pt.value {{ project-name }}-adb-target }
          mounts:
            - { path: /root/.pub-cache, source: { type: volume, scope: project, id: {{ project-name | kebab_case }}-pub-cache }}
            - { path: /root/.gradle, source: { type: volume, scope: project, id: {{ project-name | kebab_case }}-gradle-cache }}
            - { path: /opt/deps-cache, source: { type: volume, scope: project, id: {{ project-name | kebab_case }}-deps-cache }}
            - { path: /opt/android-sdk-linux/ndk, source: { type: volume, scope: project, id: {{ project-name | kebab_case }}-android-ndk }}
            - { path: /opt/android-sdk-linux/build-tools, source: { type: volume, scope: project, id: {{ project-name | kebab_case }}-android-build-tools }}
            - { path: /opt/android-sdk-linux/platforms, source: { type: volume, scope: project, id: {{ project-name | kebab_case }}-android-platforms }}
            - { path: /opt/android-sdk-linux/cmake, source: { type: volume, scope: project, id: {{ project-name | kebab_case }}-android-cmake }}
            - { path: /app/build, source: { type: volume, scope: project, id: {{ project-name | kebab_case }}-build-output }}
