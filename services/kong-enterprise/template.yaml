name: Kong Gateway Enterprise
description: Kong Gateway Enterprise 3.12 — commercial distribution with bundled EE plugins
variables:
  - name: license_key
    description: |
      Kong Enterprise license JSON string (single-line, unescaped).
      Paste the full JSON blob from your Kong license file. Without it the
      gateway still starts but EE-only plugins are disabled.
    secret:
      name: kong-enterprise-license
      key: license-data
connection_profiles:
  proxy:
    description: Proxy API (route traffic through Kong)
    prefix: KONG
    env_vars:
      - suffix: HOST
        default: "{{upstream}}.{{upstream_ns}}.svc.cluster.local"
      - suffix: PORT
        default: "8000"
  frontend:
    description: Frontend proxy — provides API_URL and API_HOST for Vite/Next.js dev servers
    prefix: API
    env_vars:
      - suffix: URL
        default: "http://{{upstream}}.{{upstream_ns}}.svc.cluster.local"
      - suffix: HOST
        default: "{{upstream}}.{{upstream_ns}}.bluetext.localhost"
