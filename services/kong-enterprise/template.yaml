id: kong-enterprise
name: Kong Gateway Enterprise
description: Kong Gateway Enterprise 3.12 — commercial distribution with bundled EE plugins
ports:
  - 8000
  - 8001
variables:
  - name: license_key
    description: |
      Kong Enterprise license JSON string (single-line, unescaped).
      Paste the full JSON blob from your Kong license file. Without it the
      gateway still starts but EE-only plugins are disabled.
    secret:
      name: kong-enterprise-license
      key: license-data
