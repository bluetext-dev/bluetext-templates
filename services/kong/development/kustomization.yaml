apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../base
images:
  - name: kong
    newName: k3d-bluetext.localhost:5111/kong
    newTag: latest
patches:
  - path: patches.yaml
  - target:
      kind: Ingress
      name: kong
    patch: |
      - op: replace
        path: /spec/rules/0/host
        value: kong.{{NAMESPACE}}.bluetext.localhost
      - op: add
        path: /spec/ingressClassName
        value: traefik
      - op: add
        path: /metadata/annotations
        value:
          traefik.ingress.kubernetes.io/router.entrypoints: web
      - op: add
        path: /spec/rules/-
        value:
          host: kong.{{NAMESPACE}}.bluetext.lvh.me
          http:
            paths:
              - path: /
                pathType: Prefix
                backend:
                  service:
                    name: kong
                    port:
                      number: 80
