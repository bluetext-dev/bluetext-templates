apiVersion: apps/v1
kind: Deployment
metadata:
  name: kong
spec:
  template:
    spec:
      containers:
        - name: kong
          imagePullPolicy: Never
          volumeMounts:
            - name: system
              mountPath: /app
      volumes:
        - name: system
          hostPath:
            path: /var/mnt/system/code/services/kong
            type: Directory
        - name: kong-config
          hostPath:
            path: /var/mnt/system/config/kong
            type: Directory
