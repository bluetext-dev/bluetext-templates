apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: resonate--resonate
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
spec:
  ingressClassName: traefik
  rules:
    - host: resonate.$bt{{ deploy::namespace }}.bluetext.localhost
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: resonate--resonate
                port:
                  number: 80
