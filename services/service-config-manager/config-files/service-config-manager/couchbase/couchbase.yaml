bucket_defaults:
  ram_quota_mb: 100
  bucket_type: couchbase
  num_replicas: 0
  flush_enabled: false
  eviction_policy: value_only
  compression_mode: off

collection_defaults:
  max_ttl: 0  # seconds

buckets:
  main:
    defaults:
      flush_enabled: true
      compression_mode: passive
    env_settings:
      dev:
        ram_quota_mb: 100
        num_replicas: 0
      test:
        ram_quota_mb: 150
        num_replicas: 1
      staging:
        ram_quota_mb: 500
        num_replicas: 2
        flush_enabled: false
        eviction_policy: full_eviction
        compression_mode: active
      prod:
        ram_quota_mb: 2048
        num_replicas: 3
        flush_enabled: false
        eviction_policy: full_eviction
        compression_mode: active
    scopes:
      _default:
        collections: {}
        # Collections live under a scope. `{}` above is an empty map — SCM
        # will create the scope but no collections. Uncomment the example
        # below to add one, or copy the shape for each collection the app
        # needs:
        #
        # collections:
        #   notes:                      # collection name (Couchbase key)
        #     defaults:
        #       max_ttl: 0              # 0 = no TTL; override per env below
        #     env_settings:
        #       staging:
        #         max_ttl: 86400
        #       prod:
        #         max_ttl: 0
