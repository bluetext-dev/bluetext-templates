apiVersion: apps/v1
kind: Deployment
metadata:
  name: service-config-manager
spec:
  template:
    spec:
      containers:
        - name: service-config-manager
          volumeMounts:
            - name: project
              mountPath: /app
            - name: config
              mountPath: /config
            - name: pip-cache
              mountPath: /root/.cache
      volumes:
        - name: project
          hostPath:
            path: /var/mnt/project/code/services/service-config-manager
            type: Directory
        - name: config
          hostPath:
            path: /var/mnt/project/config
            type: Directory
        - name: pip-cache
          hostPath:
            path: /var/mnt/workspace/.bluetext/cache/service-config-manager/pip
            type: DirectoryOrCreate
