apiVersion: apps/v1
kind: Deployment
metadata:
  name: tigerbeetle
spec:
  template:
    spec:
      containers:
        - name: tigerbeetle
          imagePullPolicy: Always
          resources:
            requests:
              memory: "1Gi"
              cpu: "500m"
            limits:
              memory: "2Gi"
              cpu: "1"
