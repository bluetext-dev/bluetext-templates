<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bluetext Cloud</title>
</head>
<body>
  <h1>hello from web-app</h1>
  <p id="api-message">Loading...</p>
  <script>
    fetch('/api/hello')
      .then(res => res.json())
      .then(data => {
        document.getElementById('api-message').textContent = data.message;
      })
      .catch(() => {
        document.getElementById('api-message').textContent = 'Failed to reach API';
      });
  </script>
</body>
</html>
