apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../base
patches:
  - path: patches.yaml
  - target:
      kind: Ingress
      name: web-app
    patch: |
      - op: replace
        path: /spec/rules/0/host
        value: web-app.{{NAMESPACE}}.bluetext.localhost
      - op: add
        path: /spec/ingressClassName
        value: traefik
