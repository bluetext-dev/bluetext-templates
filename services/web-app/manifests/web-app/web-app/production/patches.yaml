apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-app--web-app
spec:
  replicas: 2
  template:
    spec:
      containers:
        - name: app
          imagePullPolicy: Always
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "250m"
